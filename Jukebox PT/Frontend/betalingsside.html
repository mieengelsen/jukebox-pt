<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="betalingsside.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Proza+Libre:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />
    <title>Betalingsside</title>
  </head>
  <body>
    <header class="topbar">
      <div class="left-icons">
        <img src="instagram_logo.png" alt="Instagram" />
        <img src="facebook_logo.png" alt="Facebook" />
      </div>

      <h1 class="h1">Betal til PULSES ferie</h1>
    </header>

    <div class="container2">
      <div class="box">
        <h2 class="h2">Scan og betal</h2>
        <p class="p">PULSE:2876UV</p>
        <img src="qrkode.png" alt="MobilePay" />
      </div>

      <div class="box">
        <h2 class="h2">Betal i baren</h2>
        <textarea
          placeholder="Skriv dit navn her og oplys det i baren."
        ></textarea>
      </div>
    </div>

    <div class="betal-wrapper">
      <div class="betal-box">Betal xxx kr.</div>
    </div>

    <a href="index.html">
      <img src="tilbageknap.png" alt="Tilbage" class="tilbage-knap" />
    </a>
  </body>
</html>
