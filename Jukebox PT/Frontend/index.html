<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="forside.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Proza+Libre:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />
    <title>JukeBox</title>
  </head>
  <body>
    <header class="topbar">
      <div class="left-icons">
        <img src="instagram_logo.png" alt="Instagram" />
        <img src="facebook_logo.png" alt="Facebook" />
      </div>

      <h1 class="h1">PULSE</h1>

      <a href="betalingsside.html" class="kurv">
        <img src="kurv.png" alt="Kurv" />
      </a>
    </header>

    <div class="search-container">
      <input
        type="text"
        id="searchInput"
        placeholder="Søg efter sange, artister eller albums"
      />
      <div id="searchResults" class="search-results"></div>
    </div>

    <div class="container1">
      <div class="box">
        <h2 class="h2">PULSES udvalgte hits</h2>
        <ul class="liste">
          <li>sang 1</li>
          <li>sang 2</li>
          <li>sang 3</li>
          <li>sang 4</li>
          <li>sang 5</li>
          <li>sang 6</li>
        </ul>
      </div>

      <div class="box"><h2 class="h2">Din liste</h2></div>
    </div>

    <p class="pris">Én sang 2 kr & tre sange 5 kr</p>

    <div id="screensaver">
      <h1>Press to PULSE</h1>
      <script src="../Backend/script.js"></script>
    </div>
  </body>
</html>
